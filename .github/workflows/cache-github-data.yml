name: Refresh GitHub Cache

on:
  schedule:
    # Every 2 days at 04:00 UTC
    - cron: '0 4 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the personal access token so the push can trigger the build workflow.
          # Add AIRLINK_TOKEN as a repository secret with repo read+write scope.
          token: ${{ secrets.AIRLINK_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch and write cache
        run: npm run cache
        env:
          GH_TOKEN: ${{ secrets.AIRLINK_TOKEN }}

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-cache/cache.xml

          # Read the summary written by cache-github.ts and put it in the commit message
          SUMMARY=""
          if [ -f data/github-cache/summary.txt ]; then
            SUMMARY=$(cat data/github-cache/summary.txt)
            # Don't commit the temp file itself
            git checkout -- data/github-cache/summary.txt 2>/dev/null || true
          fi

          if [ -z "$SUMMARY" ]; then
            MSG="chore: refresh github cache"
          else
            MSG="chore: refresh github cache ($SUMMARY)"
          fi

          git diff --staged --quiet || git commit -m "$MSG"
          git push
